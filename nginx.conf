worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Pre-compressed files (from Next.js build)
    gzip_static on;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time cache=$upstream_cache_status';
    access_log /dev/stdout main;

    # API response cache
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m;

    upstream backend {
        server 127.0.0.1:8001;
        keepalive 16;
    }

    server {
        listen 8000;
        server_name _;

        # Static assets with immutable caching
        location /_next/static/ {
            alias /app/static/_next/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Other static files (HTML pages, icons, etc.)
        location / {
            root /app/static;
            try_files $uri $uri/index.html $uri.html @fallback;
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
        }

        # Fallback to uvicorn for unmatched paths (SPA catch-all)
        location @fallback {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # API requests → uvicorn (with proxy cache)
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;

            # Cache GET responses keyed by player.
            # X-Player-Id is enforced for all authed /api/* by FastAPI middleware
            # (api/main.py:586-592), so it's always present for cacheable responses.
            # Without ignoring Cache-Control: nginx skips caching for `private`
            # responses (which all our authed endpoints emit). Since the cache key
            # includes X-Player-Id, treating private as cacheable here is safe.
            proxy_cache api_cache;
            proxy_cache_methods GET;
            proxy_cache_key "$request_method$request_uri$http_x_player_id";
            proxy_cache_valid 200 60s;
            proxy_ignore_headers Cache-Control X-Accel-Expires Expires Set-Cookie;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Health check
        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}

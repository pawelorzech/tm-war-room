<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TM Hub — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .logo {
      margin-bottom: 32px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #e6edf3;
    }
    p {
      color: #8b949e;
      font-size: 0.9rem;
      line-height: 1.5;
      max-width: 320px;
      margin-bottom: 32px;
    }
    button {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
      border: 1px solid rgba(63, 185, 80, 0.3);
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: rgba(63, 185, 80, 0.25);
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="/icons/icon-192.png" alt="TM Hub" width="80" height="80">
  </div>
  <h1>Jesteś offline</h1>
  <p>Połącz się z internetem, żeby zobaczyć aktualne dane z TM Hub.</p>
  <button onclick="location.reload()">Spróbuj ponownie</button>
</body>
</html>

name: Deploy to Coolify

on:
  push:
    branches: [master]
  workflow_dispatch:

# F-14: minimum scope for GITHUB_TOKEN; tighten per-job if some step needs more.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # F-13: actions pinned by full commit SHA (not mutable tag) — supply chain hardening.
      # Update via dependabot (.github/dependabot.yml) + manual review of the diff.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: uv sync --extra dev
      - run: uv run pytest -n auto --dist loadfile
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
      - run: cd frontend && npm ci && npm run build
      # Post-mortem 2026-05-15: a broken nginx location block crashed prod
      # for ~9 min before a revert recovered it. Catch syntax errors here.
      # Uses the same base image + nginx packages as the production Dockerfile
      # (Stage 2: python:3.12-slim + nginx-full + brotli dynamic modules) so
      # `brotli on;` and friends resolve, not an unknown-directive emerg.
      - name: Validate nginx.conf
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro" \
            python:3.12-slim sh -c "
              apt-get update -qq &&
              apt-get install -y -qq --no-install-recommends \
                nginx-full \
                libnginx-mod-http-brotli-filter \
                libnginx-mod-http-brotli-static &&
              nginx -t
            "

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true")
          echo "$RESPONSE" | jq .
          DEPLOY_UUID=$(echo "$RESPONSE" | jq -r '.deployments[0].deployment_uuid')
          echo "Deployment queued: $DEPLOY_UUID"
          # Coolify build typically takes 3-4 min — poll for up to 8 min before giving up.
          for i in $(seq 1 80); do
            sleep 6
            STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments/$DEPLOY_UUID" | jq -r '.status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "finished" ]; then echo "Deploy successful!"; exit 0; fi
            if [ "$STATUS" = "failed" ]; then echo "Deploy failed!"; exit 1; fi
          done
          echo "Deploy timed out (8 min)"; exit 1
